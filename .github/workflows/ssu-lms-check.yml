name: SSU LMS 과제 확인

on:
  schedule:
    # 매시 53분 (UTC). KST 기준으로는 매시 :53 (예: UTC 00:53 = KST 09:53)
    # 서버 부하 분산을 위해 정각 대신 애매한 분(53분)으로 설정
    - cron: "53 * * * *"
  workflow_dispatch:

jobs:
  check-assignments:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: |
            due_soon_notified.json
            lms_bot_settings.json
          key: lms-notify-state-${{ github.repository }}
          restore-keys: |
            lms-notify-state-${{ github.repository }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run LMS check and Discord due-soon alerts
        env:
          SSU_ID: ${{ secrets.SSU_ID }}
          SSU_PASSWORD: ${{ secrets.SSU_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DUE_SOON_HOURS: ${{ secrets.DUE_SOON_HOURS }}
          SSU_HEADLESS: "true"
          SSU_KEEP_BROWSER_OPEN: "false"
          SSU_ONLY_ACTIVE_ASSIGNMENTS: "true"
          SSU_SEND_ALL_ASSIGNMENTS: "false"
          SSU_TIMEZONE: "Asia/Seoul"
          PYTHONIOENCODING: utf-8
        run: python main.py
